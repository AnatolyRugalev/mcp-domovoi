name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - name: verify static cross-builds
        run: |
          make build
          ! file dist/* | grep -v 'statically linked'
      - name: goreleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
  lint-install-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh -n install.sh
      - run: shellcheck install.sh
